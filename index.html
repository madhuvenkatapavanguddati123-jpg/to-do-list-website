<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="header-row">
      <h1>Power To-Do</h1>
      <div class="header-actions">
        <button id="notif-btn" class="btn-icon" title="Enable Notifications">🔔</button>
        <button id="theme-toggle" class="btn-icon">🌙</button>
      </div>
    </div>
    
    <div class="stats-container">
      <div class="progress-bar"><div id="progress-fill"></div></div>
      <p id="stats-text">0/0 completed</p>
    </div>

    <form id="todo-form">
      <div class="input-group">
        <input type="text" id="task-input" placeholder="What needs doing?" required />
      </div>
      <div class="options-row">
        <select id="priority-input">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
        <select id="category-input">
          <option value="Personal">Personal</option>
          <option value="Work">Work</option>
          <option value="Shopping">Shopping</option>
        </select>
        <input type="datetime-local" id="date-input" />
        <button type="submit" id="add-btn">Add Task</button>
      </div>
    </form>

    <ul id="task-list"></ul>
    
    <div id="footer-actions" style="display: none;">
      <button id="clear-all" class="btn delete">Clear All</button>
    </div>
    <p id="empty-msg" class="empty-msg">No tasks found. Relax! ☕</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
