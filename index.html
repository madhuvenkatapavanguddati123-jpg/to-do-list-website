<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="header-row">
      <h1>To-Do List</h1>
      <button id="theme-toggle" class="btn-icon" title="Toggle Dark Mode">🌙</button>
    </div>
    
    <div class="stats-container">
      <div class="progress-bar"><div id="progress-fill"></div></div>
      <p id="stats-text">0% completed</p>
    </div>

    <form id="todo-form">
      <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" />
      <button type="submit" id="add-btn">Add</button>
    </form>

    <ul id="task-list"></ul>
    
    <div id="footer-actions" style="display: none;">
      <button id="clear-all" class="btn delete">Clear All</button>
    </div>

    <p id="empty-msg" class="empty-msg">Your list is empty. Enjoy your day! ☀️</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
