<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To‑Do List App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>To‑Do List</h1>
    <p class="subtitle">Add tasks, edit or delete them. Tasks are saved in your browser.</p>

    <form id="todo-form">
      <input
        type="text"
        id="task-input"
        placeholder="Enter a task..."
        autocomplete="off"
      />
      <button type="submit" id="add-btn">Add</button>
    </form>

    <p id="empty-msg" class="empty-msg">No tasks yet. Add your first one!</p>

    <ul id="task-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
